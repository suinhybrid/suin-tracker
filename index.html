<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="suin++">
<meta name="theme-color" content="#ff79b0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>suin++</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f8f6;
    --card: #ffffff;
    --text: #1a1a1a;
    --sub: #999;
    --border: #ebebeb;
    --accent: #ff79b0;
    --accent-light: #ffeef6;
    --green: #5bb98c;
    --streak: #ff9966;
    --pin: #f5c542;
  }
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  body {
    background: var(--bg);
    font-family: 'Pretendard', -apple-system, sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
    letter-spacing: -0.05em;
  }

  /* ── Header ── */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 28px 20px 0;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }

  /* ── Week Strip ── */
  .week-nav {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 4px;
    padding-bottom: 14px;
  }
  .week-arrow {
    background: none; border: none; cursor: pointer;
    color: var(--sub); font-size: 18px;
    padding: 4px 6px; border-radius: 8px;
    transition: color 0.15s; flex-shrink: 0; line-height: 1;
  }
  .week-arrow:hover { color: var(--accent); }
  .week-arrow:disabled { opacity: 0.2; cursor: default; }
  .week-days {
    display: flex;
    flex: 1;
    justify-content: space-between;
    gap: 4px;
  }
  .day-cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 7px 4px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .day-cell:hover { background: var(--bg); }
  .day-cell.selected { background: var(--accent); }
  .day-cell.is-today:not(.selected) { background: #ffeef6; }
  .day-name {
    font-size: 10px;
    font-weight: 500;
    color: var(--sub);
    letter-spacing: 0.3px;
  }
  .day-cell.selected .day-name { color: rgba(255,255,255,0.75); }
  .day-cell.is-today:not(.selected) .day-name { color: var(--accent); }
  .day-num {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }
  .day-cell.selected .day-num { color: white; }
  .day-cell.is-today:not(.selected) .day-num { color: var(--accent); }
  .day-cell.future .day-name,
  .day-cell.future .day-num { color: #bbb; }
  .day-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: transparent;
  }
  .day-cell.has-activity .day-dot { background: var(--green); }
  .day-cell.selected .day-dot { background: rgba(255,255,255,0.6); }


  /* ── Mood ── */
  .mood-wrap { max-width: 480px; margin: 16px auto 0; padding: 0 20px; }
  .mood-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 14px 0;
    display: flex; flex-direction: column; gap: 0;
    overflow: hidden;
  }
  .mood-top { display: flex; flex-direction: column; gap: 10px; padding-bottom: 14px; }
  .mood-label { font-size: 11px; color: var(--sub); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .mood-options { display: flex; justify-content: space-between; gap: 6px; }
  .mood-btn {
    flex: 1;
    aspect-ratio: 1;
    max-width: 80px;
    border-radius: 16px;
    border: 2.5px solid transparent;
    background: transparent;
    cursor: pointer;
    transition: all 0.18s;
    display: flex; align-items: center; justify-content: center;
    padding: 2px;
  }
  .mood-btn img { width: 100%; height: 100%; object-fit: contain; }
  .mood-btn:hover { transform: scale(1.1); }
  .mood-btn.selected {
    border-color: var(--accent);
    background: transparent;
    transform: scale(1.08);
  }
  .mood-note {
    width: 100%; border: none; outline: none;
    background: transparent; font-size: 16px;
    color: var(--text); font-family: inherit;
    resize: none; height: auto; min-height: 44px;
    line-height: 1.6; padding: 12px 0 14px;
    border-top: 1px solid var(--border);
    display: block; overflow: hidden;
  }
  .mood-note::placeholder { color: #ccc; }

  /* ── Section ── */
  section { max-width: 480px; margin: 16px auto 0; padding: 0 20px; }
  .section-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 8px;
  }
  .section-title { font-size: 13px; font-weight: 600; color: var(--sub); letter-spacing: -0.05em; font-family: 'Pretendard', sans-serif; }
  .progress-text { font-size: 12px; color: var(--sub); }

  /* ── Card ── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }

  /* ── Item ── */
  .item {
    display: flex; align-items: center;
    padding: 13px 18px; gap: 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s;
  }
  .item:last-of-type { border-bottom: none; }
  .item.done .item-text { text-decoration: line-through; color: #bbb; }
  .item.done { background: #fafafa; }
  .check-box {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; background: white;
  }
  .item:hover .check-box { border-color: var(--accent); }
  .item.done .check-box { background: var(--accent); border-color: var(--accent); }
  .check-box svg { display: none; }
  .item.done .check-box svg { display: block; }
  .item-text { flex: 1; font-size: 15px; color: var(--text); }
  .streak-badge {
    display: flex; align-items: center; gap: 3px;
    font-size: 12px; color: var(--streak); font-weight: 600;
    background: #fff4ee; padding: 3px 8px; border-radius: 20px; flex-shrink: 0;
  }
  .delete-btn {
    opacity: 0; background: none; border: none; cursor: pointer;
    color: var(--sub); font-size: 18px; padding: 0 4px;
    transition: opacity 0.15s; line-height: 1;
  }
  .item:hover .delete-btn { opacity: 1; }

  /* ── Add row ── */
  .add-row {
    display: flex; align-items: center;
    padding: 11px 18px; gap: 10px;
    border-top: 1px solid var(--border);
  }
  .add-row.hidden { display: none; }


  .add-input {
    flex: 1; border: none; outline: none;
    font-size: 16px; color: var(--text);
    font-family: inherit; background: transparent;
  }
  .add-input::placeholder { color: #ccc; }

  /* ── Streak Grid ── */
  .streak-grid-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; }
  .streak-habit-row { margin-bottom: 14px; }
  .streak-habit-row:last-child { margin-bottom: 0; }
  .streak-habit-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .streak-habit-name { font-size: 13px; font-weight: 500; }
  .streak-count { font-size: 12px; color: var(--streak); font-weight: 600; }
  .streak-dots { display: flex; gap: 4px; flex-wrap: wrap; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
  .dot.filled { background: var(--accent); }
  .dot.current { background: var(--accent); }
  .dot.current-empty { background: var(--border); outline: 2px solid var(--accent); outline-offset: 1px; }

  .empty { padding: 20px 18px; font-size: 13px; color: #ccc; text-align: center; }
  .quote { max-width: 480px; margin: 24px auto 0; padding: 0 20px; font-size: 12px; color: #ccc; text-align: center; line-height: 1.8; }

  /* ── Review ── */
  .review-wrap { max-width: 480px; margin: 14px auto 0; padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
  .review-card {
    background: #fff8f0; border: 1px solid #ffdfc0;
    border-radius: 16px; padding: 16px 18px;
  }
  .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .review-badge {
    font-size: 11px; font-weight: 700; color: #ff8c42;
    background: #fff0e6; padding: 3px 10px; border-radius: 20px;
    border: 1px solid #ffdfc0;
  }
  .review-from { font-size: 11px; color: var(--sub); }
  .review-text { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 12px; }
  .review-done-btn {
    width: 100%; padding: 9px; border-radius: 10px;
    border: 1px solid #ffdfc0; background: white;
    color: #ff8c42; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; letter-spacing: -0.05em;
    transition: background 0.15s;
  }
  .review-done-btn:hover { background: #fff0e6; }

  /* ── Learning ── */
  .learning-item {
    display: flex; align-items: flex-start;
    padding: 13px 18px; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .learning-item:last-of-type { border-bottom: none; }
  .learning-num {
    font-size: 11px; color: var(--accent); font-weight: 700;
    min-width: 20px; height: 20px; border-radius: 50%;
    background: #ffeef6;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
  }
  .learning-text { flex: 1; font-size: 14px; color: var(--text); line-height: 1.6; }
  .review-pips { display: flex; gap: 4px; align-items: center; flex-shrink: 0; margin-top: 4px; }
  .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .pip.done { background: var(--accent); }
  .pip-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .pip-label { font-size: 10px; color: var(--sub); }


  /* ── Reorder Buttons ── */
  .reorder-btns { display: flex; flex-direction: column; gap: 0; flex-shrink: 0; }
  .reorder-btn {
    background: none; border: none; cursor: pointer;
    color: #d8d8d8; font-size: 12px; padding: 1px 4px;
    line-height: 1.2; transition: color 0.15s; font-family: inherit;
  }
  .reorder-btn:hover, .reorder-btn:active { color: var(--accent); }
  .item.drag-over { box-shadow: inset 0 2px 0 var(--accent); }

</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1>suin<span>++</span></h1>
    <span id="monthLabel" style="font-size:13px;color:var(--sub);font-weight:500;"></span>
  </div>
  <div class="week-nav">
    <button class="week-arrow" id="prevWeek">‹</button>
    <div class="week-days" id="weekDays"></div>
    <button class="week-arrow" id="nextWeek" disabled>›</button>
  </div>
</header>


<div class="review-wrap" id="reviewWrap"></div>
<div class="mood-wrap">
  <div class="mood-row">
    <div class="mood-top">
      <div class="mood-options" id="moodCats"></div>
    </div>
    <textarea class="mood-note" id="moodNote" placeholder="한 줄 메모..." rows="1"></textarea>
  </div>
</div>

<section>
  <div class="section-header">
    <span class="section-title">오늘의 약속</span>
    <span class="progress-text" id="promiseProgress"></span>
  </div>
  <div class="card">
    <div id="promiseList"></div>
    <div class="add-row" id="promiseAddRow">
      <input class="add-input" id="promiseInput" placeholder="나에게 약속하기..." />
    </div>
  </div>
</section>

<section>
  <div class="section-header">
    <span class="section-title">루틴</span>
    <span class="progress-text" id="habitProgress"></span>
  </div>
  <div class="card">
    <div id="habitList"></div>
    <div class="add-row" id="habitAddRow">
      <input class="add-input" id="habitInput" placeholder="새 루틴 추가..." />
    </div>
  </div>
</section>

<section>
  <div class="section-header">
    <span class="section-title">연속 달성</span>
  </div>
  <div class="streak-grid-wrap" id="streakGrid"></div>
</section>


<section>
  <div class="section-header">
    <span class="section-title">오늘 배운 것</span>
    <span class="progress-text" id="learningProgress"></span>
  </div>
  <div class="card">
    <div id="learningList"></div>
    <div class="add-row" id="learningAddRow">
      <input class="add-input" id="learningInput" placeholder="오늘 배운 내용 기록..." />
    </div>
  </div>
</section>

<div class="quote">나만이 가질 수 있는 분위기를 만들기</div>

const MOOD_LABELS = {'😊':'행복','😐':'보통','😢':'슬퍼','😤':'화남','🥰':'설레'};

// ── Constants ──
const _now = new Date();
const TODAY = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;
const DAY_NAMES = ['일','월','화','수','목','금','토']; // indexed by getDay()
const CHECK_SVG = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

// ── Storage ──
function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Date helpers ──
function toLocalDS(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(ds, n) {
  const d = new Date(ds + 'T00:00:00'); d.setDate(d.getDate() + n);
  return toLocalDS(d);
}
// 주 기준: 월요일 시작 ~ 일요일 끝
function getMondayOfWeek(ds) {
  const d = new Date(ds + 'T00:00:00');
  const day = d.getDay(); // 0=일, 1=월 ... 6=토
  const diff = day === 0 ? -6 : 1 - day; // 일요일이면 -6, 나머지는 월요일로
  d.setDate(d.getDate() + diff);
  const y = d.getFullYear(), m = d.getMonth()+1, dd = d.getDate();
  return `${y}-${String(m).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
}
function getWeekDates(weekStart) {
  // 월~일 7일 반환
  return Array.from({length: 7}, (_, i) => addDays(weekStart, i));
}

// ── State ──
let viewDate = TODAY;
let weekStart = getMondayOfWeek(TODAY);

// ── Data accessors ──
const getDayPromises   = d => load('promises_' + d, []);
const getMood          = d => load('mood_' + d, {emoji:'', note:''});
const getHabits        = () => load('habits', []);
const getHabitChecks   = () => load('checks', {});

// ── Activity check (any item done on a date) ──
function hasActivity(ds) {
  if (getDayPromises(ds).some(p => p.done)) return true;
  const hc = getHabitChecks();
  if (getHabits().some(h => (hc[h.id]||[]).includes(ds))) return true;
  return false;
}

// ── Week Strip ──
function renderWeekStrip() {
  const dates = getWeekDates(weekStart);
  const firstDay = new Date(dates[0] + 'T00:00:00');
  const lastDay  = new Date(dates[6] + 'T00:00:00');
  // Month label
  const sameMonth = firstDay.getMonth() === lastDay.getMonth();
  document.getElementById('monthLabel').textContent = sameMonth
    ? `${firstDay.getFullYear()}년 ${firstDay.getMonth()+1}월`
    : `${firstDay.getMonth()+1}월 — ${lastDay.getMonth()+1}월`;

  // Prev/next arrows
  document.getElementById('prevWeek').disabled = false;
  document.getElementById('nextWeek').disabled = false;

  const container = document.getElementById('weekDays');
  container.innerHTML = dates.map(ds => {
    const d = new Date(ds + 'T00:00:00');
    const isFuture = ds > TODAY;
    const isToday  = ds === TODAY;
    const isSel    = ds === viewDate;
    const hasAct   = !isFuture && hasActivity(ds);
    const classes  = ['day-cell',
      isSel    ? 'selected'     : '',
      isToday  ? 'is-today'     : '',
      isFuture ? 'future'       : '',
      hasAct   ? 'has-activity' : '',
    ].filter(Boolean).join(' ');
    return `
    <div class="${classes}" data-date="${ds}" onclick="selectDate('${ds}')">
      <span class="day-name">${DAY_NAMES[d.getDay()]}</span>
      <span class="day-num">${d.getDate()}</span>
      <div class="day-dot"></div>
    </div>`;
  }).join('');
}

function selectDate(ds) {
  if (ds > TODAY) return;
  viewDate = ds;
  renderAll();
}

document.getElementById('prevWeek').addEventListener('click', () => {
  weekStart = addDays(weekStart, -7);
  renderAll();
});
document.getElementById('nextWeek').addEventListener('click', () => {
  weekStart = addDays(weekStart, 7);
  renderAll();
});

// ── Mood ──
function clickMood(m) {
  const mood = getMood(viewDate);
  mood.emoji = mood.emoji === m ? '' : m;
  save('mood_' + viewDate, mood);
  renderMood();
}
function renderMood() {
  const mood = getMood(viewDate);
  const isPast = viewDate < TODAY;
  document.querySelectorAll('.mood-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.mood === mood.emoji);

  });
  const note = document.getElementById('moodNote');
  note.value = mood.note || '';
  setTimeout(() => autoResize(note), 0);
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}
document.getElementById('moodNote').addEventListener('input', e => {
  autoResize(e.target);
  const mood = getMood(viewDate); mood.note = e.target.value;
  save('mood_' + viewDate, mood);
});

// ── Promises ──
function renderPromises() {
  const dayP = getDayPromises(viewDate);
  const isPast = viewDate < TODAY;
  const done = dayP.filter(p => p.done).length;
  document.getElementById('promiseProgress').textContent = dayP.length ? `${done} / ${dayP.length}` : '';

  const list = document.getElementById('promiseList');
  if (dayP.length === 0) { list.innerHTML = '<div class="empty">no promises yet.</div>'; return; }
  list.innerHTML = dayP.map(p => `<div class="item ${p.done?'done':''}" data-id="${p.id}"
    onclick="toggleDay('${p.id}')">
    <div class="reorder-btns" onclick="event.stopPropagation()">
      <button class="reorder-btn" onclick="event.stopPropagation();moveItem('promise','${p.id}',-1)">▲</button>
      <button class="reorder-btn" onclick="event.stopPropagation();moveItem('promise','${p.id}',1)">▼</button>
    </div>
    <div class="check-box">${CHECK_SVG}</div>
    <span class="item-text" onclick="event.stopPropagation();editItem('promise','${p.id}',event)">${esc(p.text)}</span>
    <button class="delete-btn" onclick="event.stopPropagation();deleteDay('${p.id}')">×</button>
  </div>`).join('');
}

function toggleDay(id) {
  const dp = getDayPromises(viewDate);
  const p = dp.find(x => x.id === id);
  if (p) { p.done = !p.done; save('promises_' + viewDate, dp); renderPromises(); renderWeekStrip(); }
}
function deleteDay(id) {
  save('promises_' + viewDate, getDayPromises(viewDate).filter(x => x.id !== id));
  renderPromises();
}


function addPromise() {
  const inp = document.getElementById('promiseInput');
  const val = inp.value.trim(); if (!val) return;
  const dp = getDayPromises(viewDate);
  dp.push({id: Date.now().toString(), text: val, done: false});
  save('promises_' + viewDate, dp);
  inp.value = '';
  renderPromises(); renderWeekStrip();
}
document.getElementById('promiseInput').addEventListener('keydown', e => {
  if (e.key !== 'Enter' || e.isComposing) return;
  addPromise();
});

// ── Habits ──
function getStreak(id, checks) {
  const dates = checks[id] || [];
  if (!dates.includes(TODAY)) return 0;
  let streak = 0, d = new Date();
  while (true) {
    const ds = toLocalDS(d);
    if (dates.includes(ds)) { streak++; d.setDate(d.getDate()-1); } else break;
  }
  return streak;
}

function renderHabits() {
  const habits = getHabits();
  const checks = getHabitChecks();
  const isPast = viewDate < TODAY;
  const done = habits.filter(h => (checks[h.id]||[]).includes(viewDate)).length;
  document.getElementById('habitProgress').textContent = habits.length ? `${done} / ${habits.length}` : '';

  const list = document.getElementById('habitList');
  if (habits.length === 0) { list.innerHTML = '<div class="empty">build something daily.</div>'; }
  else {
    list.innerHTML = habits.map(h => {
      const isDone = (checks[h.id]||[]).includes(viewDate);
      const streak = getStreak(h.id, checks);
      return `<div class="item ${isDone?'done':''}" data-id="${h.id}"
        onclick="toggleHabit('${h.id}')">
        <div class="reorder-btns" onclick="event.stopPropagation()">
          <button class="reorder-btn" onclick="event.stopPropagation();moveItem('habit','${h.id}',-1)">▲</button>
          <button class="reorder-btn" onclick="event.stopPropagation();moveItem('habit','${h.id}',1)">▼</button>
        </div>
        <div class="check-box">${CHECK_SVG}</div>
        <span class="item-text" onclick="event.stopPropagation();editItem('habit','${h.id}',event)">${esc(h.text)}</span>
        ${streak>0?`<span class="streak-badge">🔥 ${streak}</span>`:''}
        <button class="delete-btn" onclick="event.stopPropagation();deleteHabit('${h.id}')">×</button>
      </div>`;
    }).join('');
  }
  renderStreakGrid(habits, checks);
}

function toggleHabit(id) {
  const checks = getHabitChecks();
  if (!checks[id]) checks[id] = [];
  const i = checks[id].indexOf(viewDate);
  i > -1 ? checks[id].splice(i,1) : checks[id].push(viewDate);
  save('checks', checks);
  renderHabits(); renderWeekStrip();
}
function deleteHabit(id) {
  save('habits', getHabits().filter(x => x.id !== id));
  renderHabits();
}
function addHabit() {
  const inp = document.getElementById('habitInput');
  const val = inp.value.trim(); if (!val) return;
  const habits = getHabits();
  habits.push({id: Date.now().toString(), text: val, created: TODAY});
  save('habits', habits);
  inp.value = '';
  renderHabits();
}
document.getElementById('habitInput').addEventListener('keydown', e => {
  if (e.key !== 'Enter' || e.isComposing) return;
  addHabit();
});

// ── Streak Grid (생성일~오늘, 월간 초기화) ──
function getMonthStreakDates(habit) {
  const monthStart = TODAY.slice(0,7) + '-01';
  const start = (habit.created && habit.created >= monthStart) ? habit.created : monthStart;
  const dates = [];
  let d = start;
  while (d <= TODAY) { dates.push(d); d = addDays(d, 1); }
  return dates;
}
function renderStreakGrid(habits, checks) {
  const grid = document.getElementById('streakGrid');
  if (!habits || habits.length === 0) {
    grid.innerHTML = '<div class="empty">complete routines to build your streak.</div>'; return;
  }
  grid.innerHTML = habits.map(h => {
    const dates = checks[h.id] || [];
    const streak = getStreak(h.id, checks);
    const streakDates = getMonthStreakDates(h);
    const dots = streakDates.map(d => {
      const filled = dates.includes(d);
      const isCur = d === TODAY;
      let cls = 'dot';
      if (filled && isCur) cls += ' current';
      else if (filled)     cls += ' filled';
      else if (isCur)      cls += ' current-empty';
      return `<div class="${cls}" title="${d}"></div>`;
    }).join('');
    return `<div class="streak-habit-row">
      <div class="streak-habit-label">
        <span class="streak-habit-name">${esc(h.text)}</span>
        <span class="streak-count">${streak>0?'🔥 '+streak+'일 연속':''}</span>
      </div>
      <div class="streak-dots">${dots}</div>
    </div>`;
  }).join('');
}

// ── Render All ──
function renderAll() {
  renderReviews();
  renderLearnings();
  renderWeekStrip();
  renderMood();
  renderPromises();
  renderHabits();
}


// ── Spaced Repetition ──
const getLearnings = () => load('learnings', []);
const REVIEW_DAYS   = [1, 7, 30];
const REVIEW_LABELS = ['1일 후 복습', '1주일 후 복습', '1달 후 복습'];

function daysBetween(d1, d2) {
  return Math.round((new Date(d2 + 'T00:00:00') - new Date(d1 + 'T00:00:00')) / 86400000);
}

function getReviewsDue(targetDate) {
  const all = getLearnings();
  const results = [];
  for (const l of all) {
    const diff = daysBetween(l.date, targetDate);
    for (let i = 0; i < REVIEW_DAYS.length; i++) {
      if (diff >= REVIEW_DAYS[i] && !(l.done || [])[i]) {
        results.push({ l, i });
        break;
      }
    }
  }
  return results;
}

function markReviewDone(id, stage) {
  const all = getLearnings();
  const l = all.find(x => x.id === id);
  if (l) {
    if (!l.done) l.done = [false, false, false];
    l.done[stage] = true;
    save('learnings', all);
    renderReviews();
    renderLearnings();
  }
}

function renderReviews() {
  const due = getReviewsDue(viewDate);
  const wrap = document.getElementById('reviewWrap');
  if (!due.length) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = due.map(({ l, i }) => `
    <div class="review-card">
      <div class="review-header">
        <span class="review-badge">🔁 ${REVIEW_LABELS[i]}</span>
        <span class="review-from">${fmtDate(l.date)}에 배운 것</span>
      </div>
      <div class="review-text">${esc(l.text)}</div>
      <button class="review-done-btn" onclick="markReviewDone('${l.id}', ${i})">✓ 복습 완료</button>
    </div>`).join('');
}

function renderLearnings() {
  const all = getLearnings().filter(l => l.date === viewDate);
  const isPast = viewDate < TODAY;
  document.getElementById('learningProgress').textContent =
    all.length ? `${all.length}개` : '';

  const list = document.getElementById('learningList');
  if (!all.length) {
    list.innerHTML = '<div class="empty">what did you learn today?</div>';
    return;
  }
  list.innerHTML = all.map((l, idx) => {
    const done = l.done || [false, false, false];
    const pips = REVIEW_DAYS.map((_, i) =>
      `<div class="pip ${done[i] ? 'done' : ''}" title="${REVIEW_LABELS[i]}"></div>`
    ).join('');
    return `<div class="learning-item">
      <div class="learning-num">${idx + 1}</div>
      <span class="learning-text">${esc(l.text)}</span>
      <div class="pip-wrap">
        <div class="review-pips">${pips}</div>
        <span class="pip-label">1일·1주·1달</span>
      </div>
      <button class="delete-btn" onclick="event.stopPropagation();deleteLearning('${l.id}')">×</button>
    </div>`;
  }).join('');
}

function deleteLearning(id) {
  save('learnings', getLearnings().filter(x => x.id !== id));
  renderLearnings();
}

function addLearning() {
  const inp = document.getElementById('learningInput');
  const val = inp.value.trim(); if (!val) return;
  const all = getLearnings();
  all.push({ id: Date.now().toString(), text: val, date: viewDate, done: [false, false, false] });
  save('learnings', all);
  inp.value = '';
  renderLearnings();
}
document.getElementById('learningInput').addEventListener('keydown', e => {
  if (e.key !== 'Enter' || e.isComposing) return;
  addLearning();
});

initMoodCats();
renderAll();

// ── Reorder ──
function moveItem(type, id, dir) {
  if (type === 'promise') {
    const arr = getDayPromises(viewDate);
    const i = arr.findIndex(x => x.id === id), j = i + dir;
    if (i < 0 || j < 0 || j >= arr.length) return;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    save('promises_' + viewDate, arr); renderPromises();
  } else {
    const arr = getHabits();
    const i = arr.findIndex(x => x.id === id), j = i + dir;
    if (i < 0 || j < 0 || j >= arr.length) return;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    save('habits', arr); renderHabits();
  }
}


// ── Item Editing ──
function editItem(type, id, e) {
  const span = e.currentTarget;
  const oldText = span.textContent;
  const input = document.createElement('input');
  input.value = oldText;
  input.style.cssText = 'flex:1;border:none;outline:none;font-size:15px;font-family:inherit;background:transparent;letter-spacing:-0.05em;color:var(--text);min-width:0;';
  span.replaceWith(input);
  input.focus();
  input.select();
  let saved = false;
  function saveEdit() {
    if (saved) return; saved = true;
    const newText = input.value.trim() || oldText;
    if (type === 'promise') {
      const arr = getDayPromises(viewDate);
      const it = arr.find(x => x.id === id);
      if (it) { it.text = newText; save('promises_' + viewDate, arr); }
      renderPromises();
    } else if (type === 'habit') {
      const arr = getHabits();
      const it = arr.find(x => x.id === id);
      if (it) { it.text = newText; save('habits', arr); }
      renderHabits();
    } else if (type === 'learning') {
      const arr = getLearnings();
      const it = arr.find(x => x.id === id);
      if (it) { it.text = newText; save('learnings', arr); }
      renderLearnings();
    }
  }
  input.addEventListener('blur', saveEdit);
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter' && !ev.isComposing) { input.blur(); }
    if (ev.key === 'Escape') { saved = true; input.value = oldText; input.blur(); if (type==='promise') renderPromises(); else if(type==='habit') renderHabits(); else renderLearnings(); }
  });
}

// ── PWA Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
